    <title>Dsigner Studio Interiors - Premium Interior Design Studio</title>

    <!-- Font Awesome for WhatsApp Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        body {
            font-family: "Montserrat", sans-serif;
            margin: 0;
            padding: 0;
            min-height: 2000px;
            background: #f5f5f5;
        }

        /* Content styling */
        .content {
            text-align: center;
            padding: 60px 20px;
        }

        .content h1 {
            color: #ff7a18;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .content p {
            color: #666;
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ===== SCROLL TO TOP BUTTON ===== */
        #scrollTopBtn {
            position: fixed;
            bottom: 100px;
            left: 30px;
            z-index: 999;

            width: 50px;
            height: 50px;
            border: none;
            outline: none;
            cursor: pointer;

            font-size: 28px;
            color: #fff;

            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);

            /* ORANGE GRADIENT */
            background: linear-gradient(135deg, #ff7a18, #ffb347);

            display: flex;
            align-items: center;
            justify-content: center;

            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        /* SHOW BUTTON */
        #scrollTopBtn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* HOVER EFFECT */
        #scrollTopBtn:hover {
            transform: scale(1.15);
            box-shadow: 0 15px 35px rgba(255, 122, 24, 0.5);
        }

        /* ===== WHATSAPP BUTTON ===== */
        #whatsappBtn {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 999;

            width: 55px;
            height: 55px;
            border-radius: 50%;

            background: linear-gradient(135deg, #25d366, #128c7e);
            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);

            transition: all 0.3s ease;

            /* NEW: Glow animation */
            animation: whatsappGlow 2s infinite ease-in-out;
        }

        /* ICON */
        #whatsappBtn i {
            font-size: 30px;
            color: white;
            z-index: 2;
        }

        /* OUTER RIPPLE RING */
        #whatsappBtn::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(37, 211, 102, 0.4);
            animation: ripple 2s infinite;
            z-index: 1;
        }

        /* SECOND RING FOR DEPTH */
        #whatsappBtn::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(37, 211, 102, 0.2);
            animation: ripple 2s infinite 1s;
            z-index: 1;
        }

        /* GLOW EFFECT */
        @keyframes whatsappGlow {
            0% {
                box-shadow:
                    0 0 0 0 rgba(37, 211, 102, 0.5),
                    0 10px 25px rgba(0, 0, 0, 0.2);
            }

            50% {
                box-shadow:
                    0 0 20px 10px rgba(37, 211, 102, 0.3),
                    0 15px 35px rgba(0, 0, 0, 0.25);
            }

            100% {
                box-shadow:
                    0 0 0 0 rgba(37, 211, 102, 0.5),
                    0 10px 25px rgba(0, 0, 0, 0.2);
            }
        }

        /* RIPPLE EXPAND */
        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(2.2);
                opacity: 0;
            }
        }

        /* HOVER EFFECT */
        #whatsappBtn:hover {
            transform: scale(1.15);
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            #scrollTopBtn {
                bottom: 80px;
                left: 20px;
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            #whatsappBtn {
                bottom: 80px;
                right: 20px;
                width: 45px;
                height: 45px;
            }

            #whatsappBtn i {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <div class="content">
            <h1>Dsigner Studio Interiors</h1>
            <p>Creating beautiful spaces that inspire and delight. Transforming visions into reality since 2012.</p>
            <p style="margin-top: 40px; font-size: 14px">↓ Scroll down to see the buttons in action ↓</p>
        </div>
    </div>

    <!-- SCROLL TO TOP BUTTON -->
    <button id="scrollTopBtn" aria-label="Scroll to top">↑</button>

    <!-- WHATSAPP BUTTON -->
    <a href="https://wa.me/919010989991?text=Hello%20DS%20Interiors,%20I%20would%20like%20to%20know%20more%20about%20your%20services"
        id="whatsappBtn" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const scrollBtn = document.getElementById("scrollTopBtn");
        const whatsappBtn = document.getElementById("whatsappBtn");

        window.addEventListener("scroll", () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add("show");
            } else {
                scrollBtn.classList.remove("show");
            }
        });

        scrollBtn.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth",
            });
        });

        window.addEventListener("scroll", () => {
            if (whatsappBtn) {
                if (window.scrollY > 100) {
                    whatsappBtn.style.opacity = "1";
                    whatsappBtn.style.visibility = "visible";
                } else {
                    whatsappBtn.style.opacity = "0.7";
                }
            }
        });
    </script>
</body>

</html>
